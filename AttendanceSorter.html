<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AttendanceSorter - ICCT San Mateo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--ink:#e8e2f8;--paper:#0c0c18;--cream:#13132a;--accent:#e05544;--gold:#e8b86d;--muted:#6a6480;--rule:#1e1e38;--green:#27a866;--blue:#3b82f6;--panel-bg:rgba(18,18,36,0.92);--panel-border:#1e1e38;--shadow:#06060f;--hbg:#080814;--dbg:#111124;--sbg:#080814}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--paper);color:var(--ink);font-family:'DM Sans',sans-serif;min-height:100vh}
body{background-image:repeating-linear-gradient(transparent,transparent 31px,rgba(30,30,56,0.5) 31px,rgba(30,30,56,0.5) 32px);background-attachment:fixed}
.wrapper{max-width:920px;margin:0 auto;padding:28px 22px 80px}
header{display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--rule);padding-bottom:16px;margin-bottom:22px;gap:14px;flex-wrap:wrap}
.hl{display:flex;align-items:center;gap:14px}
.logo{width:68px;height:68px;border-radius:50%;border:2px solid #2a2a50;box-shadow:0 0 18px rgba(232,184,109,0.18);flex-shrink:0;transition:transform .3s}
.logo:hover{transform:scale(1.07) rotate(-4deg)}
.lb h1{font-family:'Playfair Display',serif;font-size:clamp(1.4rem,3.6vw,2.5rem);font-weight:900;letter-spacing:-1px;line-height:1;color:var(--ink)}
.lb h1 span{color:var(--accent)}
.lb p{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-top:5px}
.tbtn{display:flex;align-items:center;gap:7px;background:var(--panel-bg);border:1.5px solid var(--panel-border);border-radius:20px;padding:5px 13px;font-family:'DM Mono',monospace;font-size:.59rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:border-color .2s,color .2s;box-shadow:2px 2px 0 var(--shadow)}
.tbtn:hover{color:var(--ink);border-color:var(--gold)}
.pill{width:30px;height:16px;background:var(--accent);border-radius:8px;position:relative;transition:background .3s}
.pill::after{content:'';position:absolute;width:10px;height:10px;background:var(--paper);border-radius:50%;top:3px;left:17px;transition:transform .3s}
.lm .pill{background:var(--rule)}
.lm .pill::after{transform:translateX(-14px);background:white}
.mr{display:grid;grid-template-columns:repeat(auto-fit,minmax(138px,1fr));gap:12px;margin-bottom:22px;padding:14px 18px;background:var(--panel-bg);border:1.5px solid var(--panel-border);border-radius:3px;box-shadow:3px 3px 0 var(--shadow)}
.mf{display:flex;flex-direction:column;gap:4px}
.mf label{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.mf input{background:transparent;border:none;border-bottom:1.5px solid #2a2a50;padding:4px 0;font-family:'Playfair Display',serif;font-size:.87rem;color:var(--ink);outline:none;width:100%;transition:border-color .2s}
.mf input::placeholder{color:var(--muted);font-style:italic}
.mf input:focus{border-color:var(--gold)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
@media(max-width:640px){.grid{grid-template-columns:1fr}}
.panel{background:var(--panel-bg);border:1.5px solid var(--panel-border);border-radius:3px;overflow:hidden;box-shadow:4px 4px 0 var(--shadow)}
.ph{display:flex;align-items:center;justify-content:space-between;padding:10px 15px;background:var(--hbg);border-bottom:1px solid var(--rule)}
.ph h2{font-family:'DM Mono',monospace;font-size:.64rem;letter-spacing:.18em;text-transform:uppercase;font-weight:500;color:var(--gold)}
.badge{font-family:'DM Mono',monospace;font-size:.59rem;background:var(--accent);color:white;padding:2px 8px;border-radius:2px;letter-spacing:.05em}
textarea{width:100%;min-height:340px;padding:14px;background:transparent;border:none;outline:none;resize:vertical;font-family:'DM Mono',monospace;font-size:.79rem;line-height:2.1;color:var(--ink);letter-spacing:.02em}
textarea::placeholder{color:var(--muted);font-style:italic;line-height:1.8}
.oi{min-height:340px}
.es{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:10px;color:var(--muted);padding:24px;text-align:center}
.es .arr{font-size:2rem;opacity:.25;animation:bob 2s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.es p{font-family:'DM Mono',monospace;font-size:.67rem;letter-spacing:.08em;opacity:.5}
.sl{list-style:none}
.sl li{display:flex;align-items:center;padding:7px 15px;border-bottom:1px solid var(--rule);gap:10px;opacity:0;transform:translateX(8px);animation:si .2s ease forwards}
@keyframes si{to{opacity:1;transform:translateX(0)}}
.sl li:last-child{border-bottom:none}
.num{font-family:'DM Mono',monospace;font-size:.57rem;color:var(--muted);min-width:22px;text-align:right}
.ltag{font-family:'Playfair Display',serif;font-size:.68rem;font-weight:900;color:#0c0c18;background:var(--gold);width:18px;height:18px;display:flex;align-items:center;justify-content:center;border-radius:2px;flex-shrink:0}
.nt{font-family:'DM Mono',monospace;font-size:.78rem;letter-spacing:.03em;color:var(--ink);flex:1}
.dr{padding:0;border:none;animation:none!important;opacity:1!important;transform:none!important}
.dv{display:flex;align-items:center;padding:5px 15px 4px;background:var(--dbg);border-bottom:1px solid var(--rule);gap:8px}
.dv span{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:900;color:var(--accent)}
.dv::after{content:'';flex:1;height:1px;background:var(--rule)}
.ctrl{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap;align-items:center}
button{cursor:pointer;border:none;outline:none;font-family:'DM Mono',monospace;letter-spacing:.1em;text-transform:uppercase;font-size:.64rem;padding:10px 14px;border-radius:2px;transition:all .14s;font-weight:500}
.bs{background:var(--gold);color:#0c0c18;box-shadow:3px 3px 0 var(--shadow)}
.bs:hover{transform:translate(-1px,-1px);filter:brightness(1.1)}
.bc{background:transparent;color:var(--muted);border:1.5px solid var(--rule)}
.bc:hover{border-color:var(--muted);color:var(--ink)}
.bx{background:var(--green);color:white;box-shadow:3px 3px 0 var(--shadow)}
.bx:hover{transform:translate(-1px,-1px);filter:brightness(1.12)}
.bp{background:#7c3aed;color:white;box-shadow:3px 3px 0 var(--shadow)}
.bp:hover{transform:translate(-1px,-1px);filter:brightness(1.12)}
.bcp{background:var(--blue);color:white;box-shadow:3px 3px 0 var(--shadow);margin-left:auto}
.bcp:hover{transform:translate(-1px,-1px);filter:brightness(1.12)}
.bcp.ok{background:var(--gold);color:#0c0c18}
.sb{display:flex;gap:16px;margin-top:14px;padding:11px 16px;background:var(--sbg);border:1px solid var(--rule);border-radius:2px;flex-wrap:wrap}
.st{display:flex;flex-direction:column;gap:2px}
.sv{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--gold);line-height:1}
.sl2{font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.dvl{width:1px;background:var(--rule);align-self:stretch}
footer{margin-top:32px;text-align:center;padding-top:12px;border-top:1px solid var(--rule);font-family:'DM Mono',monospace;font-size:.54rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.tip{position:fixed;bottom:20px;right:20px;background:var(--gold);color:#0c0c18;padding:9px 16px;border-radius:2px;font-family:'DM Mono',monospace;font-size:.67rem;letter-spacing:.05em;font-weight:700;box-shadow:3px 3px 0 var(--shadow);transform:translateY(70px);transition:transform .28s cubic-bezier(.34,1.56,.64,1);z-index:200}
.tip.on{transform:translateY(0)}
body.lm{background:#f5f0e8;background-image:repeating-linear-gradient(transparent,transparent 31px,rgba(208,200,184,0.55) 31px,rgba(208,200,184,0.55) 32px);color:#1a1a2e;--ink:#1a1a2e;--paper:#f5f0e8;--cream:#ede8dc;--accent:#c8392b;--gold:#d4a853;--muted:#8a8070;--rule:#d0c8b8;--panel-bg:rgba(255,255,255,0.6);--panel-border:#d0c8b8;--shadow:#c8c0b0;--hbg:#1a1a2e;--dbg:#ede8dc;--sbg:#1a1a2e}
@media print{*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}html,body{background:white!important;background-image:none!important}.ctrl,.tbtn,.sb,footer,.ip{display:none!important}.grid{grid-template-columns:1fr!important}.wrapper{padding:0!important;max-width:100%!important}.panel{background:white!important;border:1px solid #ccc!important;box-shadow:none!important}.ph{background:#1a1a2e!important}.ph h2{color:#d4a853!important}.sl li{opacity:1!important;transform:none!important;border-color:#eee!important}.nt{color:black!important}.num{color:#666!important}.ltag{background:#d4a853!important;color:white!important}.dv{background:#f0f0f0!important}.dv span{color:#c8392b!important}.mr{background:#f5f5f5!important;box-shadow:none!important}.mf input,.mf label{color:#333!important;border-color:#999!important}}
</style>
</head>

  try { localStorage.setItem('icct-t', isLight ? 'l' : 'd'); } catch(e) {}
}
try { if (localStorage.getItem('icct-t') === 'l') toggleTheme(); } catch(e) {}

var ni = document.getElementById('ni');

ni.addEventListener('paste', function(e) {
  e.preventDefault();
  var raw = (e.clipboardData || window.clipboardData).getData('text');
  var out = parsePaste(raw);
  var s = ni.selectionStart, en = ni.selectionEnd;
  ni.value = ni.value.slice(0, s) + out + ni.value.slice(en);
  ni.selectionStart = ni.selectionEnd = s + out.length;
  recount();
});
ni.addEventListener('input', recount);

function parsePaste(raw) {
  var result = [];
  var lines = raw.split('\n');
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    var last = line.charAt(line.length - 1);
    if (last === '\r') { line = line.slice(0, line.length - 1); }
    var cells = line.split('\t');
    var name = cells[0].trim();
    if (name) result.push(name);
  }
  return result.join('\n');
}

function getNames() {
  var result = [];
  var lines = ni.value.split('\n');
  for (var i = 0; i < lines.length; i++) {
    var n = lines[i].split('\t')[0].trim();
    if (n) result.push(n);
  }
  return result;
}

function recount() {
  var n = getNames().length;
  document.getElementById('inC').textContent = n + (n === 1 ? ' name' : ' names');
}

function doSort() {
  var raw = getNames();
  if (!raw.length) {
    ni.style.outline = '2px solid #e05544';
    setTimeout(function() { ni.style.outline = ''; }, 700);
    return;
  }
  sorted = raw.slice().sort(function(a, b) {
    return a.localeCompare(b, 'en', {sensitivity: 'base'});
  });

  var seen = {}, dupes = 0;
  for (var i = 0; i < raw.length; i++) {
    var k = raw[i].toLowerCase();
    seen[k] = (seen[k] || 0) + 1;
  }
  for (var k in seen) { if (seen[k] > 1) dupes++; }

  var ul = document.createElement('ul');
  ul.className = 'sl';
  var curL = '';
  for (var i = 0; i < sorted.length; i++) {
    var name = sorted[i];
    var fc = name.charAt(0).toUpperCase();
    if (fc !== curL) {
      curL = fc;
      var dli = document.createElement('li');
      dli.className = 'dr';
      dli.innerHTML = '<div class="dv"><span>' + fc + '</span></div>';
      ul.appendChild(dli);
    }
    var li = document.createElement('li');
    li.style.animationDelay = (i * 0.02) + 's';
    li.innerHTML = '<span class="num">' + (i + 1) + '</span>' +
                   '<span class="ltag">' + fc + '</span>' +
                   '<span class="nt">' + esc(name) + '</span>';
    ul.appendChild(li);
  }

  var op = document.getElementById('op');
  op.innerHTML = '';
  op.appendChild(ul);
  document.getElementById('outC').textContent = sorted.length + ' sorted';

  var lset = {};
  for (var i = 0; i < sorted.length; i++) lset[sorted[i].charAt(0).toUpperCase()] = 1;
  var first = sorted[0].split(',')[0].trim();
  var last  = sorted[sorted.length - 1].split(',')[0].trim();

  document.getElementById('sb').style.display = 'flex';
  document.getElementById('stT').textContent = sorted.length;
  document.getElementById('stL').textContent = Object.keys(lset).length;
  document.getElementById('stD').textContent = dupes;
  document.getElementById('stF').textContent = first;
  document.getElementById('stZ').textContent = last;
}

function doClear() {
  ni.value = '';
  sorted = [];
  document.getElementById('inC').textContent  = '0 names';
  document.getElementById('outC').textContent = '0 names';
  document.getElementById('op').innerHTML =
    '<div class="es"><div class="arr">&#8594;</div><p>Sorted names will appear here</p></div>';
  document.getElementById('sb').style.display = 'none';
}

function getMeta() {
  var d = document.getElementById('datef');
  return {
    prof: document.getElementById('prof').value,
    subj: document.getElementById('subj').value,
    sect: document.getElementById('sect').value,
    date: d.value || d.placeholder
  };
}

function doCopy() {
  if (!sorted.length) { tip('Sort names first!'); return; }
  var m = getMeta();
  var rows = [];
  rows.push('ICCT COLLEGES FOUNDATION INC.\t\t');
  rows.push('SAN MATEO SATELLITE CAMPUS\t\t');
  rows.push('ATTENDANCE LIST\t\t');
  if (m.prof) rows.push('Professor:\t' + m.prof + '\t');
  if (m.subj) rows.push('Subject:\t' + m.subj + '\t');
  if (m.sect) rows.push('Section:\t' + m.sect + '\t');
  rows.push('Date:\t' + m.date + '\t');
  rows.push('\t\t');
  rows.push('No.\tName\tSignature');
  for (var i = 0; i < sorted.length; i++) rows.push((i+1) + '\t' + sorted[i] + '\t');
  navigator.clipboard.writeText(rows.join('\n')).then(function() {
    var b = document.getElementById('cpbtn');
    b.textContent = 'Copied!';
    b.classList.add('ok');
    tip('Copied! Paste into Excel.');
    setTimeout(function() { b.textContent = 'Copy List'; b.classList.remove('ok'); }, 2200);
  }).catch(function() { tip('Copy failed'); });
}

function doXlsx() {
  if (!sorted.length) { tip('Sort names first!'); return; }
  var m = getMeta();
  var rows = [];
  rows.push(['ICCT COLLEGES FOUNDATION INC.','','','']);
  rows.push(['SAN MATEO SATELLITE CAMPUS','','','']);
  rows.push(['','','','']);
  rows.push(['ATTENDANCE LIST','','','']);
  if (m.prof) rows.push(['Professor:', m.prof, '', '']);
  if (m.subj) rows.push(['Subject:',   m.subj, '', '']);
  if (m.sect) rows.push(['Section:',   m.sect, '', '']);
  rows.push(['Date:', m.date, '', '']);
  rows.push(['','','','']);
  rows.push(['No.', 'Name', 'Signature', 'Remarks']);
  for (var i = 0; i < sorted.length; i++) rows.push([i+1, sorted[i], '', '']);
  var wb2 = XLSX.utils.book_new();
  var ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:6},{wch:36},{wch:22},{wch:16}];
  XLSX.utils.book_append_sheet(wb2, ws, 'Attendance');
  var safe  = (m.sect || 'List').replace(/[^a-zA-Z0-9]/g, '_');
  var safeD = m.date.replace(/[^a-zA-Z0-9]/g, '_');
  XLSX.writeFile(wb2, 'Attendance_' + safe + '_' + safeD + '.xlsx');
  tip('Excel (.xlsx) downloaded!');
}

function doPrint() {
  if (!sorted.length) { tip('Sort names first!'); return; }
  window.print();
}

function tip(msg) {
  var t = document.getElementById('tip');
  t.textContent = msg;
  t.classList.add('on');
  clearTimeout(tip._t);
  tip._t = setTimeout(function() { t.classList.remove('on'); }, 2600);
}

function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') doSort();
});
</script>
</body>
